# Updated version for ESP32 C3 mini
# https://github.com/Benvdaa/ginlong-solis


# Lolin Wemos Esp32 C3 Mini board # 
# HARDWARE: ESP32C3 160MHz, 320KB RAM, 4MB Flash
# RGB Led GPIO7
# RGB Colors:
 # - White:  hex xFFFFFF   | R 100%, G 100%, B 100%  | G 255, R 255, B 255 
 # - Blue:   hex x3200FF   | R 20% , G 0%  , B 100%  | R 50, G 0, B 250
 # - Red :   hex xFFFFFF   | R 100%, G 0%  , B 20%   | R 250, G 0, B 50
 # - Yelow:  hex xFFFFFF   | R 100%, G 100%, B 0%    | R 250, G 250, B 0
 # - Orange: hex xFFFFFF   | R 100%, G 48% , B 0%    | R 255 , G 115 , B 0
 # - Green:  hex xFFFFFF   | R 0%  , G 100%, B 20%   | R 0, G 250, B 50

# RS485 - RS232 Board
 # -Rxd GPIO1
 # -Txd GPIO0


# Version changes:
# v 0.0.1 2026-04-12"  Init
#
# v 0.0.4 2026-04-22"
# - Wifi networks added
#
# v 0.0.5 2026-04-28"
# v 0.0.6 2026-05-03"
# - changed light output.




substitutions:
  time_timezone: "Europe/Amsterdam"
  # vdate: "v 0.0.4 2026-04-22"
  project_version: "0.0.6" # From 22-04-2026 new version
  date: "03-05-2026"
  device_description: "${friendly_name} gemaakt door van der Aa versie: ${project_version} - date ${date}."
  name: solis-inverter
  friendly_name: Ginlong Solis Inverter



esphome:
  name: ${name} ## solis-esphome-esp32c3
  friendly_name: ${friendly_name} ## Ginlong Solis Inverter
  name_add_mac_suffix: false
  comment: ${device_description}
  project: 
    name: "Ginlong.Solis Inverter Project"
    version: ${project_version} 

# Board
esp32:
  board: esp32-c3-devkitm-1
  framework:
    #type: arduino
    type: esp-idf


# Enable logging
logger:
  #level: DEBUG

# Enable Home Assistant API
api:
  id: ha_api
  encryption:   # Uses key set by Home Assistant
  
  # Api Actions
  on_client_connected: 
    then:
      - light.turn_on: 
          id: activity_led
          brightness: 80%
          red: 20%
          green: 0%
          blue: 100%  
          flash_length: 1500ms     

  on_client_disconnected: 
    then:
      

# Enable OTA
ota:
  - platform: esphome  
  #  password: # Uses key set by Home Assistant

# Enable Wifi

wifi:
  min_auth_mode: WPA2
   #  auth expired errors work around:
   # The amount of TX power for the WiFi interface from 8.5dB to 20.5dB. Default for ESP8266 is 20dB, 20.5dB might cause unexpected restarts.
  output_power: 8.5

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    #ssid: "Solis-Esphome-Esp32C3"
    password: "12345678"
    
improv_serial:

# Enable Web Server 
web_server:
  port: 80
  version: 3
 # local: true

# Enable Time component
time:
  - platform: homeassistant
    id: network_time

# ⬇ Enable SPI RGB Led  #--------------------- ⬇ #
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO7
    num_leds: 1
    #rmt_channel: 0
    chipset: ws2812
    name: "Status LED"
    id: "activity_led"
    default_transition_length: 0.1s 
    restore_mode: ALWAYS_OFF
    flash_transition_length: 100ms
    entity_category: config
    disabled_by_default: true # intentionally disabled, remove if you know what you are doing

# ⬇ switches to control from HA ⬇ #
switch:
  - platform: template
    name: "Status LED enabled"
    id: led_enabled
    icon: mdi:alarm-light-outline
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    disabled_by_default: true # intentionally disabled, remove if you know what you are doing

# ⬇ packages ⬇ #
#packages:
#  remote_package:
#    url: https://github.com/Benvdaa/vanderaa-projecten/
#    ref: main
#    files:
#    #  - esphome/components/solis-esphome-esp32c3.yaml
#      - esphome/components/solis-modbus-inv-copy.yaml
      
#    refresh: 0d  

# ⬇ Script Configuration  ⬇ #
script:
  - mode: restart
    id: modbus_activity
    then:
      # e.g. blink led

      - light.turn_on: 
          id: activity_led
          brightness: 80%
          red: 0%
          green: 100%
          blue: 20%  
          flash_length: 200ms   
      
# ⬇ UART Configuration  ⬇ #
uart:
  id: modbus_uart
  tx_pin: GPIO0   # D6 on di mini
  rx_pin: GPIO1   # D5 on d1 mini
  baud_rate: 9600

# ⬇ Modbus Configuration  ⬇ #
modbus:
  #flow_control_pin: D7
  send_wait_time: 300ms
  id: modbus_hw

modbus_controller:
  - id: modbus_master
    address: 0x1
    modbus_id: modbus_hw
    setup_priority: -10
  
# ⬇ Button Configuration  ⬇ #
button:
  - platform: factory_reset
    name: Restart with factory default settings
    id: reset_all
  - platform: restart
    name: Reboot device

# ⬇ Sensor Configuration  ⬇ #
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    icon: mdi:wifi
 # ⬇ Uptime informatie sensor ⬇ #
  - platform: uptime
    type: seconds         
    name: Uptime Sensor 
    

# ⬇ Text Sensor Configuration  ⬇ #
text_sensor:

  # ⬇ Wifi informatie sensor ⬇ #
  - platform: wifi_info
    
    ip_address: 
      name: Wifi IP-adres
      icon: mdi:ip-network
    mac_address:
      name: Wifi Mac-adres  # 
      icon: mdi:folder-key-network-outline
   # dns_address:
   #  name: Wifi DNS Address
   #  icon: mdi:ip-network
    ssid:
      name: Wifi Ssid  # 
      icon: mdi:folder-key-network-outline
    bssid:
      name: Wifi Ssid Mac  # 
      icon: mdi:folder-key-network-outline

  
  # ⬇ ESPHome Version information sensor ⬇ #
  - platform: version
    name: "ESPHome Version"     
    hide_timestamp: true 
    
